<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" role="img" aria-label="YieldUP farming app logo">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e3"/>
      <stop offset="100%" stop-color="#b8e0a8"/>
    </linearGradient>
    <linearGradient id="field" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6bbf59"/>
      <stop offset="50%" stop-color="#40916c"/>
      <stop offset="100%" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1b4332" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="188" fill="url(#sky)" stroke="rgba(45,106,79,0.2)" stroke-width="2"/>

  <!-- Rolling hills / paddy fields -->
  <ellipse cx="200" cy="320" rx="220" ry="90" fill="url(#field)" opacity="0.9"/>
  <path d="M0 280 Q100 240 200 270 T400 280 L400 400 L0 400 Z" fill="#2d6a4f" opacity="0.7"/>
  <path d="M0 300 Q120 270 220 295 T400 310 L400 400 L0 400 Z" fill="#40916c" opacity="0.5"/>

  <!-- Sun -->
  <circle cx="310" cy="95" r="36" fill="#f4d35e" opacity="0.9"/>
  <circle cx="310" cy="95" r="48" fill="#f4d35e" opacity="0.2"/>

  <!-- Rice / crop stalks left -->
  <g stroke="#1b4332" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M85 310 Q82 250 78 190"/>
    <path d="M78 190 Q70 175 62 165 M78 210 Q68 200 58 195 M78 235 Q72 228 65 222"/>
    <path d="M105 315 Q102 255 98 185"/>
    <path d="M98 185 Q92 170 85 158 M98 205 Q88 198 80 192 M98 230 Q90 222 82 216"/>
    <path d="M125 318 Q122 260 118 192"/>
    <path d="M118 192 Q112 178 105 168 M118 212 Q108 205 100 199"/>
  </g>

  <!-- Rice / crop stalks right -->
  <g stroke="#1b4332" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M275 312 Q278 252 282 188"/>
    <path d="M282 188 Q290 173 298 163 M282 208 Q292 198 300 193 M282 233 Q288 226 295 220"/>
    <path d="M295 315 Q298 258 302 190"/>
    <path d="M302 190 Q308 176 315 166 M302 210 Q312 203 320 197"/>
    <path d="M315 318 Q318 262 322 195"/>
    <path d="M322 195 Q328 181 335 171 M322 215 Q332 208 340 202"/>
  </g>

  <!-- Center app badge -->
  <g filter="url(#shadow)">
    <rect x="118" y="118" width="164" height="164" rx="36" fill="url(#badge)" stroke="rgba(45,106,79,0.15)" stroke-width="2"/>
  </g>

  <!-- Leaf icon inside badge -->
  <path d="M200 145 C165 145 148 175 148 205 C148 240 175 258 200 268 C225 258 252 240 252 205 C252 175 235 145 200 145Z" fill="#52b788" opacity="0.25"/>
  <path d="M200 152 C172 152 158 178 158 202 C158 232 178 248 200 256 C222 248 242 232 242 202 C242 178 228 152 200 152Z" fill="#2d6a4f"/>
  <path d="M200 158 L200 248" stroke="#a8d5a2" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 175 Q175 185 168 205 M200 195 Q225 205 232 218 M200 215 Q180 225 172 238" stroke="#a8d5a2" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Microphone dot (voice) -->
  <circle cx="228" cy="168" r="10" fill="#1a6b6b"/>
  <rect x="224" y="176" width="8" height="12" rx="4" fill="#1a6b6b"/>
  <path d="M220 192 Q228 198 236 192" stroke="#1a6b6b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="200" y="302" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1b4332" letter-spacing="1">YieldUP</text>
  <text x="200" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4a5f4a" letter-spacing="2">DIGITAL KRISHI</text>
</svg>
